<div class="content"><h1>method_parameter_names - Method parameter naming conventions</h1>

Allows you to enforce a pattern, such as a prefix, for method parameter names<br><br><h2>Default Configuration</h2>
<div id="defaultConfigEditor" style="width:700px;height:266px;border:1px solid grey"></div>
  <script src="/_monaco/vs/loader.js"></script>
  <script src="/schema.js"></script>
  <script>
    require.config({ paths: { 'vs': '/_monaco/vs' }});
    require(['vs/editor/editor.main'], function() {
      var modelUri = monaco.Uri.parse("a://b/foo.json");
      var model = monaco.editor.createModel(`{
  "exclude": [],
  "reason": "",
  "patternKind": "required",
  "ignoreNames": [],
  "ignorePatterns": [],
  "ignoreExceptions": true,
  "importing": "^I._.+$",
  "returning": "^R._.+$",
  "changing": "^C._.+$",
  "exporting": "^E._.+$"
}`, "json", modelUri);

      const schema = abaplintSchema;
      schema["$ref"] = "#/definitions/MethodParameterNamesConf",

      monaco.languages.json.jsonDefaults.setDiagnosticsOptions({
        validate: true,
        schemas: [{
          uri: "https://schema.abaplint.org/dummy.json",
          fileMatch: [modelUri.toString()],
          schema,
        }],
      });

      var editor = monaco.editor.create(document.getElementById('defaultConfigEditor'), {
        model: model,
        autoClosingBrackets: false,
        minimap: {enabled: false},
        theme: "vs-dark"
      });
    });
  </script><i>Hover to see descriptions, Ctrl+Space for suggestions</i></div>

<div class="content"><h1>empty_line_in_statement - Find empty lines in statements</h1>
&nbsp;<a href="https://github.com/abaplint/abaplint/blob/master/packages/core/src/rules/empty_line_in_statement.ts"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" height="2ch"><title>edit</title><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></a><h2>Description</h2>
Checks that statements do not contain empty lines.<br><br><h2>Extended Information</h2>
<a href='https://docs.abapopenchecks.org/checks/41/'>https://docs.abapopenchecks.org/checks/41/</a><br><br><h2>Default Configuration</h2>
<div id="defaultConfigEditor" style="width:700px;height:133px;border:1px solid grey"></div>
  <script src="/_monaco/vs/loader.js"></script>
  <script src="/schema.js"></script>
  <script>
    require.config({ paths: { 'vs': '/_monaco/vs' }});
    require(['vs/editor/editor.main'], function() {
      var modelUri = monaco.Uri.parse("a://b/foo.json");
      var model = monaco.editor.createModel(`{
  "exclude": [],
  "reason": "",
  "allowChained": false
}`, "json", modelUri);

      const schema = abaplintSchema;
      schema["$ref"] = "#/definitions/EmptyLineinStatementConf",

      monaco.languages.json.jsonDefaults.setDiagnosticsOptions({
        validate: true,
        schemas: [{
          uri: "https://schema.abaplint.org/dummy.json",
          fileMatch: [modelUri.toString()],
          schema,
        }],
      });

      var editor = monaco.editor.create(document.getElementById('defaultConfigEditor'), {
        model: model,
        autoClosingBrackets: false,
        minimap: {enabled: false},
        theme: "vs-dark"
      });
    });
  </script><i>Hover to see descriptions, Ctrl+Space for suggestions</i></div>
